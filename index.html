<!DOCTYPE html>
<html>
  <head>
    <title>EasySlime</title>
      <link rel="icon" type="image/x-icon" href="costume1.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
      /* Stilovi za cijelu stranicu */
      body {
        background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%); /* Glatki prijelaz nijansi plave */
        font-family: 'Roboto', sans-serif;
        margin: 0;
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 90vh;
        text-align: center;
      }

      /* Bijela kartica koja drži sav sadržaj */
      .card {
        background-color: white;
        padding: 40px 30px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08); /* Blaga, profesionalna sjena */
        max-width: 500px;
        width: 100%;
      }

      /* Naslov stranice */
      h1 {
        color: #0284c7; /* Prepoznatljiva plava boja */
        font-size: 2rem;
        margin-top: 20px;
        margin-bottom: 15px;
      }

      /* Glavni tekst */
      p {
        color: #475569; /* Tamno siva boja koja je ugodnija za oči od crne */
        font-size: 1.1rem;
        line-height: 1.6;
        margin-bottom: 30px;
      }

      /* Moderni gumb s animacijom */
      .btn-maps {
        cursor: pointer;
        padding: 14px 28px;
        font-family: 'Roboto', sans-serif;
        font-size: 1rem;
        border-radius: 50px; /* Zaobljeni rubovi gumba */
        border: none;
        font-weight: bold;
        background-color: #0284c7; /* Plava boja gumba */
        color: white;
        box-shadow: 0 4px 12px rgba(2, 132, 199, 0.3);
        transition: all 0.3s ease; /* Glatka animacija promjene veličine */
      }

      /* Efekt kada miš prijeđe preko gumba */
      .btn-maps:hover {
        background-color: #0369a1; /* Malo tamnija plava na hover */
        transform: scale(1.05); /* Gumb se lagano poveća */
        box-shadow: 0 6px 20px rgba(2, 132, 199, 0.4);
      }
    </style>
  </head>
  <body>
     
    <!-- Glavna kartica koja okuplja elemente -->
    <div class="card">
      
      <!-- Tvoj logo koji se i dalje glatko okreće za 360 stupnjeva -->
      <img src="EasySlimeLogo.png" 
           alt="EasySlime Logo" 
           style="max-width: 250px; width: 100%; height: auto; display: block; margin: 0 auto; transition: transform 0.8s ease-in-out; cursor: pointer;"
           onmouseover="this.style.transform='rotate(360deg)'" 
           onmouseout="this.style.transform='rotate(0deg)'">

      <h1>Službena web stranica za EasySlime</h1> 
      
      <p>
        Još uvijek nismo u prodaji, ali pokušat ćemo prodavati u Mlinaru u Jarmini.
        Naša marka je najbolja zato što nismo ljepljivi kao drugi. 
      </p>

      <!-- Tvoj točan Google Maps link do Mlinara -->
      <a href="https://www.google.com/maps/place/Trgovina+Mlinar/@45.3181932,18.7204671,17z/data=!4m10!1m2!2m1!1sMlinar+Jarmina!3m6!1s0x475cf45a6bbe2fd7:0x9eb89c1381af5cea!8m2!3d45.3181932!4d18.7252307!15sCg5NbGluYXIgSmFybWluYSIDiAEBWhAiDm1saW5hciBqYXJtaW5hkgERY29udmVuaWVuY2Vfc3RvcmWaASNDaFpEU1VoTk1HOW5TMFZKUTBGblNVTmxkRXd0TFZobkVBReABAPoBBAgAECg!16s%2Fg%2F11ggrm624w?entry=ttu&g_ep=EgoyMDI2MDUyMC4wIKXMDSoASAFQAw%3D%3D" target="_blank">
        <button class="btn-maps">
           Jarmina, Mlinar
        </button>
      </a>

    </div>

  </body>
</html>
